name: 🚀 Build

on:
  push:
    branches:
      - main
      - dev
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  actions: write
  contents: read

jobs:
  lint:
    name: ⬣ BiomeJS Lint
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: ⬇️ Checkout repo
        uses: actions/checkout@v4

      - name: 🪢 Install pnpm
        uses: pnpm/action-setup@v4

      - name: ⎔ Setup node
        uses: actions/setup-node@v4
        with:
          cache: pnpm
          cache-dependency-path: ./pnpm-lock.yaml
          node-version: 22

      - name: 📥 Install deps
        run: pnpm install

      - name: 🔬 Lint
        run: pnpm run lint

  typecheck:
    name: ʦ Typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: ⬇️ Checkout repo
        uses: actions/checkout@v4

      - name: 🪢 Install pnpm
        uses: pnpm/action-setup@v4

      - name: ⎔ Setup node
        uses: actions/setup-node@v4
        with:
          cache: pnpm
          cache-dependency-path: ./pnpm-lock.yaml
          node-version: 22

      - name: 📥 Install deps
        run: pnpm install

      - name: 🔍 Typecheck
        run: pnpm run typecheck

  build:
    name: 🏗️ Build
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: ⬇️ Checkout repo
        uses: actions/checkout@v4

      - name: 🪢 Install pnpm
        uses: pnpm/action-setup@v4

      - name: ⎔ Setup node
        uses: actions/setup-node@v4
        with:
          cache: pnpm
          cache-dependency-path: ./pnpm-lock.yaml
          node-version: 22

      - name: 📥 Install deps
        run: pnpm install

      - name: 🏗️ Build
        run: pnpm run build
